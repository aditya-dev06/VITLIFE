<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients, glows, and filters -->
  <defs>
    <!-- Main VL Monogram Gradient -->
    <linearGradient id="monogram-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" /> <!-- Electric Blue -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#d946ef" /> <!-- Fuchsia/Violet -->
    </linearGradient>
    
    <!-- Background Glow Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#090a0f" stop-opacity="1" />
    </radialGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Background squircle (rounded tile) -->
  <rect width="512" height="512" rx="128" fill="#090a0f" />
  <rect width="512" height="512" rx="128" fill="url(#bg-glow)" />

  <!-- Abstract Monogram 'VL' -->
  <g filter="url(#glow-shadow)">
    <!-- Main V Left Leg and L Base (Unified curve) -->
    <path d="M 160 150 L 240 330 Q 256 366 290 366 L 370 366" fill="none" stroke="url(#monogram-grad)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" />

    <!-- V Right Leg (overlapping and blending) -->
    <path d="M 330 150 L 262 300" fill="none" stroke="url(#monogram-grad)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Subtle top highlight for glassmorphism / glossy feel -->
  <path d="M 40 128 C 40 70 80 40 128 40 L 384 40 C 432 40 472 70 472 128 C 472 80 432 50 384 50 L 128 50 C 80 50 40 80 40 128 Z" fill="#ffffff" opacity="0.08" />
</svg>